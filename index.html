<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BaseBallatro MVP</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="game-panel" aria-label="BaseBallatro game">
        <canvas id="gameCanvas" aria-label="BaseBallatro play field"></canvas>
      </section>
      <section class="controls" aria-label="Game controls">
        <h1>BaseBallatro</h1>
        <p class="tagline">A baseball-board score-combo roguelike MVP.</p>
        <button id="startButton" type="button">Start / Pitch</button>
        <button id="restartButton" type="button">Restart Run</button>
        <p class="hint">Press Space to start, then press Space once during each pitch to swing. Timing controls hit quality and board direction. Press R to restart anytime.</p>
      </section>
    </main>
    <script src="src/game.js"></script>
  </body>
</html>
